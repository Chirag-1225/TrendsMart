{% extends "base.html" %}

{% block content %}

<!-- Cart Page Heading -->
<section class="page-title">

    <div class="container">

        <h1>
            Your <span class="gradient-text">Cart</span>
        </h1>

        <p>
            Review your selected products before proceeding to payment.
        </p>

    </div>

</section>


<!-- Cart Section -->
<section class="section" style="padding-top:20px;">

    <div class="container">

        <div class="cart-box">

            <!-- Cart products will be loaded here -->
            <div id="cart-items"></div>

            <!-- Total amount -->
            <div class="total" id="cart-total">
                Total : ₹0
            </div>

            <!-- Payment button -->
            <button
                class="btn"
                style="width:100%; margin-top:18px;"
                onclick="goPayment()">
                Continue to Payment
            </button>

        </div>

    </div>

</section>

{% endblock %}
