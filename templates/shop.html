{% extends "base.html" %}

{% block content %}

<!-- Shop Page Heading -->
<section class="page-title">

    <div class="container">

        <h1>
            All <span class="gradient-text">Products</span>
        </h1>

        <p>
            Search products, sort them, view details and add your favourite
            products to wishlist.
        </p>

    </div>

</section>


<!-- Shop Section -->
<section class="section" style="padding-top:20px;">

    <div class="container">

        <!-- Category Filter -->
        <div class="category-filter">

            <a href="/shop">All</a>
            <a href="/men">Men</a>
            <a href="/women">Women</a>
            <a href="/kids">Kids</a>
            <a href="/accessories">Accessories</a>

        </div>

        <!-- Search and Sorting -->
        <div class="shop-tools">

            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="search-input" placeholder="Search by product name...">
            </div>

            <select id="sort-select">
                <option value="">Sort Products</option>
                <option value="low">Price Low to High</option>
                <option value="high">Price High to Low</option>
                <option value="rating">Top Rated</option>
                <option value="newest">Newest</option>
            </select>

            <a href="/wishlist" class="btn small-btn">
                Wishlist
            </a>

        </div>

        <!-- Products will be loaded here -->
        <div class="product-grid" id="product-grid"></div>

    </div>

</section>

{% endblock %}
